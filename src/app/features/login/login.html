<div class="card">
    <h2>Login</h2>
    <label>
        Username
        <input [value]="username()" (input)="onUsernameInput($event)" /> </label>
    <label>
        Password
        <input type="password" [value]="password()" (input)="onPasswordInput($event)" /> </label>

    <button (click)="onLogin()">Login</button>
    @if (error()) {
    <p class="error">{{ error() }}</p>
    }
</div>
